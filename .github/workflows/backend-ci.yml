name: backend-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: banka2_bek
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven
          cache-dependency-path: banka2_bek/pom.xml

      - name: Build project
        run: mvn compile -q

  test:
    name: Unit Tests + Coverage Gate
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: banka2_bek
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven
          cache-dependency-path: banka2_bek/pom.xml

      # `mvn verify` (umesto cisto `mvn test`) pokrece i `verify` fazu u kojoj
      # JaCoCo `check` execution proverava 80% line coverage threshold.
      # `haltOnFailure=true` u pom.xml znaci da build PUCA ako padne ispod —
      # CI tako enforce-uje KT3 zahtev za 80% coverage.
      - name: Run tests + JaCoCo coverage gate
        run: mvn -B verify

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: banka2_bek/target/site/jacoco/

  lint:
    name: Checkstyle Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: banka2_bek
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven
          cache-dependency-path: banka2_bek/pom.xml

      # Pre 03.05.2026 ovo je bilo `mvn checkstyle:check || true` sa
      # `continue-on-error: true` — efektivno no-op. Sada CI puca ako
      # ima checkstyle violation-a (lokalni `./mvnw checkstyle:check` vec
      # treba da prodje sa 0 violations).
      - name: Run Checkstyle
        run: mvn -B checkstyle:check

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./banka2_bek
          file: ./banka2_bek/Dockerfile
          push: false
          tags: banka2-bek:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max
